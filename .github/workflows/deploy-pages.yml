name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch Kaggle data and build site
        env:
          VITE_PEER_HOST: ${{ secrets.VITE_PEER_HOST }}
          VITE_PEER_PORT: ${{ secrets.VITE_PEER_PORT }}
          VITE_PEER_PATH: ${{ secrets.VITE_PEER_PATH }}
          VITE_PEER_SECURE: ${{ secrets.VITE_PEER_SECURE }}
        run: GITHUB_PAGES=true npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
